spring.application.name=innerchat
spring.mvc.servlet.path=/api/v1
# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.0.122:5432/innerchat}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:iteyes123$}
# HikariCP (dev default)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
# Redis
spring.data.redis.host=${REDIS_HOST:192.168.0.122}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:iteyes123$}
# SQL logs (dev)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# API error visibility (dev)
server.error.include-message=always
